name: Docker Hub

on:
  push:
    branches:
      - develop
      - latest
      - main
      - justwatch-network-top10
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'Also tag this build as latest'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Docker Hub configuration
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets are required." >&2
            exit 1
          fi

      - name: Resolve Docker image
        id: image
        env:
          DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          image="${DOCKERHUB_IMAGE:-$DOCKERHUB_USERNAME/agregarr}"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref_name == github.event.repository.default_branch || (github.event_name == 'workflow_dispatch' && inputs.push_latest) }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            COMMIT_TAG=${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
