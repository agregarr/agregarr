name: Agregarr Release

on:
  push:
    branches:
      - latest

jobs:
  version-check:
    name: Check for new version
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
      - name: Install dependencies
        env:
          HUSKY: 0
        run: yarn
      - name: Check version (dry-run)
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          dry_run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_and_push:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    needs: version-check
    if: needs.version-check.outputs.new_release_published == 'true'
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-22.04
          - platform: linux/arm64
            runner: [self-hosted, linux, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version in package.json
        run: npm version ${{ needs.version-check.outputs.new_release_version }} --no-git-tag-version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            COMMIT_TAG=${{ github.sha }}
          outputs: type=image,name=ghcr.io/agregarr/agregarr,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          rm -rf /tmp/digests
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Create multi-platform manifest
    runs-on: ubuntu-22.04
    needs:
      - version-check
      - build_and_push
    permissions:
      packages: write
      contents: read
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Create manifest on GHCR
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/agregarr/agregarr:latest \
            -t ghcr.io/agregarr/agregarr:v${{ needs.version-check.outputs.new_release_version }} \
            $(printf 'ghcr.io/agregarr/agregarr@sha256:%s ' *)

      - name: Install regctl
        run: |
          curl -L https://github.com/regclient/regclient/releases/latest/download/regctl-linux-amd64 >/tmp/regctl
          chmod +x /tmp/regctl

      - name: Copy to Docker Hub
        run: |
          /tmp/regctl image copy ghcr.io/agregarr/agregarr:latest agregarr/agregarr:latest
          /tmp/regctl image copy ghcr.io/agregarr/agregarr:v${{ needs.version-check.outputs.new_release_version }} agregarr/agregarr:v${{ needs.version-check.outputs.new_release_version }}

      - name: Inspect images
        run: |
          docker buildx imagetools inspect ghcr.io/agregarr/agregarr:latest
          docker buildx imagetools inspect agregarr/agregarr:latest

  release:
    name: Create release
    runs-on: ubuntu-22.04
    needs:
      - version-check
      - merge
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
      - name: Install dependencies
        env:
          HUSKY: 0
        run: yarn
      - name: Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  discord:
    name: Discord Notification
    runs-on: ubuntu-22.04
    needs:
      - version-check
      - release
    steps:
      - name: Send Discord Notification
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "content": "@everyone",
              "embeds": [{
                "title": "🎉 Agregarr v${{ needs.version-check.outputs.new_release_version }} Released!",
                "description": "A new version of Agregarr is now available!\n\n**[📝 View Release Notes](${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ needs.version-check.outputs.new_release_version }})**",
                "color": 15105570,
                "fields": [
                  {"name": "🐳 Update your Docker image", "value": "```docker pull agregarr/agregarr:latest```", "inline": false}
                ],
                "thumbnail": {"url": "https://raw.githubusercontent.com/agregarr/agregarr/develop/public/android-chrome-512x512.png"}
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_LATEST }}
