name: Agregarr Develop

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - develop

jobs:
  test:
    name: Lint & Test Build
    runs-on: ubuntu-22.04
    container: node:20.19.5-alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          apk add --no-cache \
            python3 make g++ gcc libc6-compat bash \
            build-base cairo-dev pango-dev jpeg-dev giflib-dev pixman-dev
      - name: Install dependencies
        env:
          HUSKY: 0
        run: yarn
      - name: Lint
        run: yarn lint
      - name: Type Check
        run: yarn typecheck
      - name: Formatting
        run: npx prettier --check .
      - name: Build
        run: yarn build

  build_and_push:
    name: Build ${{ matrix.platform }}
    if: github.event_name == 'push' && github.repository_owner == 'agregarr'
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-22.04
          - platform: linux/arm64
            runner: [self-hosted, linux, arm64]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            COMMIT_TAG=${{ github.sha }}
          outputs: type=image,name=ghcr.io/agregarr/agregarr,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          rm -rf /tmp/digests
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Create multi-platform manifest
    if: github.repository_owner == 'agregarr'
    runs-on: ubuntu-22.04
    needs: build_and_push
    permissions:
      packages: write
      contents: read
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Create manifest on GHCR
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/agregarr/agregarr:develop \
            $(printf 'ghcr.io/agregarr/agregarr@sha256:%s ' *)

      - name: Install regctl
        run: |
          curl -L https://github.com/regclient/regclient/releases/latest/download/regctl-linux-amd64 >/tmp/regctl
          chmod +x /tmp/regctl

      - name: Copy to Docker Hub
        run: |
          /tmp/regctl image copy ghcr.io/agregarr/agregarr:develop agregarr/agregarr:develop

      - name: Inspect images
        run: |
          docker buildx imagetools inspect ghcr.io/agregarr/agregarr:develop
          docker buildx imagetools inspect agregarr/agregarr:develop

  discord:
    name: Send Discord Notification
    needs: merge
    if: always() && github.repository_owner == 'agregarr' && github.event_name != 'pull_request' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-22.04
    steps:
      - name: Get Build Job Status
        uses: technote-space/workflow-conclusion-action@v3
      - name: Combine Job Status
        id: status
        run: |
          failures=(neutral, skipped, timed_out, action_required)
          if [[ ${array[@]} =~ $WORKFLOW_CONCLUSION ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=$WORKFLOW_CONCLUSION" >> $GITHUB_OUTPUT
          fi
      - name: Post Status to Discord
        if: steps.status.outputs.status == 'success'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_DEVELOP }}
          title: '✅ Agregarr Develop Build'
          description: |
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          color: 0x00ff00
          username: 'Agregarr Bot'
          url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          nofail: true
