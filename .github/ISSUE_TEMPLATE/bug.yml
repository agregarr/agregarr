name: 🐛 Bug Report
description: Report a problem
labels: ['bug', 'awaiting-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Please provide a clear and concise description of the bug or issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of Agregarr are you running? (You can find this in Settings → About → Version.)
    validations:
      required: true
  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to Reproduce
      description: Please tell us how we can reproduce the undesired behavior.
      placeholder: |
        1. Go to [...]
        2. Click on [...]
        3. Scroll down to [...]
        4. See error in [...]
    validations:
      required: true
  - type: textarea
    id: list-links
    attributes:
      label: List Links
      description: |
        If this bug is related to a collection or list, please provide the relevant link(s)/preset:
        - For custom URL's, paste all relevant list URLs
        - For default/preset lists: specify which preset you used (e.g. Trakt Trending)
      placeholder: |
        https://trakt.tv/users/example/lists/my-list
        https://www.imdb.com/list/ls000000000/
        Or: "Trakt Trending"
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, please provide screenshots depicting the problem.
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Please copy and paste any relevant log output. The logs file can be located in config/logs/agregarr-YYYY-MM-DD. (This will be automatically formatted into code, so no need for backticks.)
      render: shell
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Please provide any additional information that may be relevant or helpful.
