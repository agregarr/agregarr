          description: "Auto-request missing TV shows"
          example: false
          nullable: true
        autoApproveMovies:
          type: boolean
          description: "Auto-approve movie requests"
          example: false
          nullable: true
        autoApproveTV:
          type: boolean
          description: "Auto-approve TV show requests"
          example: false
          nullable: true
        maxSeasonsToRequest:
          type: integer
