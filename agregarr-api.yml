  /keyword/{keywordId}:
    get:
      summary: Get keyword
      description: |
        Returns a single keyword in JSON format.
      tags:
        - other
      parameters:
        - in: path
          name: keywordId
          required: true
          description: The TMDb keyword identifier.
          schema:
            type: number
            example: 1
      responses:
        '200':
          description: Keyword returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Keyword'
  /missing-items:
    get:
      summary: Get missing item requests
      description: |
        Returns a paginated list of missing item requests with optional filtering.
      tags:
        - missing-items
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
          description: Number of items to return
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of items to skip
        - in: query
          name: status
          schema:
            type: string
            enum:
              [
                pending,
                approved,
                declined,
                available,
                processing,
                failed,
                partially_available,
              ]
          description: Filter by request status
        - in: query
          name: mediaType
          schema:
            type: string
            enum: [movie, tv]
          description: Filter by media type
        - in: query
          name: collectionSource
          schema:
            type: string
            enum:
              [
                trakt,
                tmdb,
                imdb,
                letterboxd,
                mdblist,
                tautulli,
                networks,
                originals,
                overseerr,
                anilist,
                myanimelist,
                radarrtag,
                sonarrtag,
                comingsoon,
                recently_added,
                multi-source,
              ]
          description: Filter by collection source
        - in: query
          name: requestService
          schema:
            type: string
            enum: [overseerr, radarr, sonarr]
          description: Filter by request service
      responses:
        '200':
          description: Missing item requests returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissingItemsResponse'
  /missing-items/recent:
    get:
      summary: Get recent missing item requests
      description: |
        Returns the most recent missing item requests for dashboard display.
      tags:
        - missing-items
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 5
            minimum: 1
            maximum: 20
          description: Number of recent items to return
      responses:
        '200':
          description: Recent missing item requests returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/MissingItemRequest'
  /missing-items/stats:
    get:
      summary: Get missing item statistics
      description: |
        Returns statistics about missing item requests including status breakdowns and source/service distribution.
      tags:
        - missing-items
      responses:
        '200':
          description: Missing item statistics returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissingItemStats'
  /missing-items/sync:
    post:
      summary: Sync missing item status
      description: |
        Synchronizes the status of missing item requests with their current status in Overseerr.
        This endpoint checks recent missing item requests and updates their status based on
        the current state in Overseerr (e.g., pending → declined, approved → available).
      tags:
        - missing-items
      responses:
        '200':
          description: Missing item status sync completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Missing item status sync completed'
        '500':
          description: Failed to sync missing item status
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Failed to sync missing item status'
  /dashboard/stats:
    get:
      summary: Get dashboard statistics
      description: |
        Returns general dashboard statistics including collection counts, activity stats from Tautulli, and weekly plays.
      tags:
        - dashboard
      responses:
        '200':
          description: Dashboard statistics returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'
        '500':
          description: Failed to get dashboard statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Failed to get dashboard stats'
                  message:
                    type: string
                    example: 'Tautulli connection failed'
  /dashboard/collections:
    get:
      summary: Get collection statistics
      description: |
        Returns detailed collection statistics from Tautulli including play counts, duration, and user activity.
      tags:
        - dashboard
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
          description: Number of collections to return
        - in: query
          name: statType
          schema:
            type: string
            enum: [plays, duration]
            default: plays
          description: Type of statistics to sort by
        - in: query
          name: days
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 365
          description: Number of days to include in statistics
      responses:
        '200':
          description: Collection statistics returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionStatsResponse'
        '400':
          description: Tautulli not configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Tautulli not configured'
                  message:
                    type: string
                    example: 'Tautulli settings are required to fetch collection statistics'
        '500':
          description: Failed to get collection statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Failed to get collection statistics'
                  message:
                    type: string
                    example: 'Tautulli API error'
  /dashboard/activity:
    get:
      summary: Get activity statistics
      description: |
        Returns recent activity and general statistics from Tautulli including top movies and TV shows.
      tags:
        - dashboard
      parameters:
        - in: query
          name: days
          schema:
            type: integer
            default: 7
            minimum: 1
            maximum: 365
          description: Number of days to include in activity statistics
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
          description: Number of items to return
      responses:
        '200':
          description: Activity statistics returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityStatsResponse'
        '400':
          description: Tautulli not configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Tautulli not configured'
                  message:
                    type: string
                    example: 'Tautulli settings are required to fetch activity statistics'
        '500':
          description: Failed to get activity statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Failed to get activity statistics'
                  message:
                    type: string
                    example: 'Tautulli API error'

  # Hub Management Endpoints
  /hubs/configs:
    get:
      summary: Get current Plex hub configurations
      description: Retrieve all hub configurations across all libraries.
      tags:
        - hubs
      responses:
        '200':
          description: Hub configurations returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  hubConfigs:
                    type: array
                    items:
                      $ref: '#/components/schemas/PlexHubConfig'
                  preExistingCollectionConfigs:
                    type: array
                    items:
                      $ref: '#/components/schemas/PlexHubConfig'
        '500':
          description: Failed to get hub configurations
    post:
      summary: Save Plex hub configurations
      description: Create or update hub configurations.
      tags:
        - hubs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hubConfigs:
                  type: array
                  items:
                    $ref: '#/components/schemas/PlexHubConfig'
                preExistingCollectionConfigs:
                  type: array
                  items:
                    $ref: '#/components/schemas/PlexHubConfig'
      responses:
        '200':
          description: Configurations saved successfully
        '400':
          description: Invalid input
        '500':
          description: Failed to save configurations

  /hubs/configs/append:
    post:
      summary: Append new hub configurations to existing ones
      description: Append new hub configurations to existing ones.
      tags:
        - hubs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hubConfigs:
                  type: array
                  items:
                    $ref: '#/components/schemas/PlexHubConfig'
                preExistingCollectionConfigs:
                  type: array
                  items:
                    $ref: '#/components/schemas/PlexHubConfig'
      responses:
        '200':
          description: Configurations appended successfully
        '400':
          description: Invalid input
        '500':
          description: Failed to append configurations

  /hubs/libraries/{sectionId}/move:
    put:
      summary: Move a hub to a new position in the library
      description: Move a hub to a different position within a library.
      tags:
        - hubs
      parameters:
        - in: path
          name: sectionId
          required: true
          schema:
            type: string
          description: Plex library section ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hubId:
                  type: string
                  description: Hub identifier to move
                afterHubId:
                  type: string
                  description: Hub identifier to move after (optional)
              required:
                - hubId
      responses:
        '200':
          description: Hub moved successfully
        '400':
          description: Invalid input
        '500':
          description: Failed to move hub

  /hubs/libraries/{sectionId}/reorder:
    put:
      summary: Reorder multiple hubs in a library section
      description: Reorder hubs within a specific library section.
      tags:
        - hubs
      parameters:
        - in: path
          name: sectionId
          required: true
          schema:
            type: string
          description: Plex library section ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hubOrder:
                  type: array
                  items:
                    type: string
                  description: Array of hub IDs in desired order
              required:
                - hubOrder
      responses:
        '200':
          description: Hubs reordered successfully
        '400':
          description: Invalid input
        '500':
          description: Failed to reorder hubs

  /hubs/libraries/{sectionId}/visibility:
    put:
      summary: Update hub visibility settings
      description: Update visibility settings for hubs in a specific library section.
      tags:
        - hubs
      parameters:
        - in: path
          name: sectionId
          required: true
          schema:
            type: string
          description: Plex library section ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hubId:
                  type: string
                  description: Hub identifier
                visibility:
                  type: object
                  description: Visibility configuration
              required:
                - hubId
                - visibility
      responses:
        '200':
          description: Hub visibility updated successfully
        '400':
          description: Invalid input
        '500':
          description: Failed to update hub visibility

  # Discovery Endpoints
  /discovery/hubs/libraries:
    get:
      summary: Get all library hubs across all sections
      description: Discover available Plex hubs across all libraries.
      tags:
        - search
      responses:
        '200':
          description: Library hubs returned successfully
          content:
            application/json:
              schema:
                type: object
                description: 'Object with library section IDs as keys and hub data as values'
                additionalProperties:
                  type: object
                  description: 'Raw Plex hub response data for a library section'
        '500':
          description: Failed to fetch library hubs

  /discovery/hubs/libraries/{sectionId}:
    get:
      summary: Get hubs for a specific library section
      description: Discover available Plex hubs for a specific library section.
      tags:
        - search
      parameters:
        - in: path
          name: sectionId
          required: true
          schema:
            type: string
          description: Plex library section ID
      responses:
        '200':
          description: Library hubs returned successfully
          content:
            application/json:
              schema:
                type: object
                description: 'Raw Plex hub response data for the specified library section'
        '500':
          description: Failed to fetch library hubs

  /discovery/hubs/libraries/{sectionId}/manage:
    get:
      summary: Get hub management interface for a library section
      description: Get hub management interface data for a specific library section.
      tags:
        - search
      parameters:
        - in: path
          name: sectionId
          required: true
          schema:
            type: string
          description: Plex library section ID
      responses:
        '200':
          description: Hub management data returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlexHubManagementResponse'
        '500':
          description: Failed to fetch hub management data

  /discovery/hubs/scan:
    get:
      summary: Discover available Plex hubs and convert them to hub configurations
      description: Scan Plex server for available hubs and their current state.
      tags:
        - search
      responses:
        '200':
          description: Hub discovery completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  discoveredHubConfigs:
                    type: array
                    items:
                      $ref: '#/components/schemas/PlexHubConfig'
                  discoveredPreExistingConfigs:
                    type: array
                    items:
                      $ref: '#/components/schemas/PlexHubConfig'
                  totalHubsFound:
                    type: integer
                  totalPreExistingCollectionsFound:
                    type: integer
                  totalActualCollections:
                    type: integer
        '500':
          description: Failed to discover Plex hubs

  /discovery/hubs/status:
    get:
      summary: Get hub management system status and capabilities
      description: Get the current status of hub discovery operations.
      tags:
        - search
      responses:
        '200':
          description: Hub management status returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  plexConnected:
                    type: boolean
                  libraryCount:
                    type: integer
                  capabilities:
                    type: object
                    properties:
                      hubReordering:
                        type: boolean
                      visibilityControl:
                        type: boolean
                      builtInHubManagement:
                        type: boolean
                      collectionHubManagement:
                        type: boolean
        '500':
          description: Failed to get hub management status

  # Poster Management Endpoints
  /posters/templates:
    get:
      summary: Get all poster templates
      description: Retrieves all active poster templates with their metadata and configuration.
      tags:
        - poster-templates
      responses:
        '200':
          description: Templates retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: 'Classic Movie Poster'
                        description:
                          type: string
                          example: 'A classic movie poster template with text overlays'
                        isDefault:
                          type: boolean
                          example: false
                        templateData:
                          type: object
                          properties:
                            width:
                              type: number
                              example: 1000
                            height:
                              type: number
                              example: 1500
                            background:
                              type: object
                              properties:
                                type:
                                  type: string
                                  enum: [color, gradient, radial]
                                  example: 'gradient'
                                color:
                                  type: string
                                  example: '#6366f1'
                                secondaryColor:
                                  type: string
                                  example: '#1e1b4b'
                                intensity:
                                  type: number
                                  description: 'Gradient spread intensity (0-100)'
                                  example: 50
                                useSourceColors:
                                  type: boolean
                                  example: false
                            # New unified layering system (preferred)
                            elements:
                              type: array
                              description: 'Unified element list with custom layer ordering (used when migrated=true)'
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                    example: 'element-1'
                                  layerOrder:
                                    type: number
                                    description: 'Layer order - lower numbers render behind higher numbers'
                                    example: 20
                                  type:
                                    type: string
                                    enum: [text, raster, svg, content-grid]
                                    example: 'text'
                                  x:
                                    type: number
                                    example: 50
                                  y:
                                    type: number
                                    example: 100
                                  width:
                                    type: number
                                    example: 400
                                  height:
                                    type: number
                                    example: 60
                                  properties:
                                    type: object
                                    description: 'Type-specific properties based on element type'
                                    oneOf:
                                      - type: object
                                        title: 'Text Element Properties'
                                        properties:
                                          elementType:
                                            type: string
                                            enum:
                                              [collection-title, custom-text]
                                          text:
                                            type: string
                                          fontSize:
                                            type: number
                                          fontFamily:
                                            type: string
                                          fontWeight:
                                            type: string
                                            enum: [normal, bold]
                                          fontStyle:
                                            type: string
                                            enum: [normal, italic]
                                          color:
                                            type: string
                                          textAlign:
                                            type: string
                                            enum: [left, center, right]
                                          maxLines:
                                            type: number
                                      - type: object
                                        title: 'Raster Element Properties'
                                        properties:
                                          imagePath:
                                            type: string
                                      - type: object
                                        title: 'SVG Element Properties'
                                        properties:
                                          iconType:
                                            type: string
                                            enum: [source-logo, svg-icon]
                                          iconPath:
                                            type: string
                                          grayscale:
                                            type: boolean
                                      - type: object
                                        title: 'Content Grid Properties'
                                        properties:
                                          columns:
                                            type: number
                                          rows:
                                            type: number
                                          spacing:
                                            type: number
                                          cornerRadius:
                                            type: number
                            migrated:
                              type: boolean
                              description: 'Flag indicating if template has been migrated to unified layering system'
                              example: true
                            # Legacy structure (for backward compatibility)
                            textElements:
                              type: array
                              description: 'Legacy text elements (used when migrated=false)'
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                    example: 'text-1'
                                  type:
                                    type: string
                                    enum: [collection-title, custom-text]
                                    example: 'collection-title'
                                  text:
                                    type: string
                                    example: 'Collection Name'
                                  x:
                                    type: number
                                    example: 50
                                  y:
                                    type: number
                                    example: 100
                                  width:
                                    type: number
                                    example: 400
                                  height:
                                    type: number
                                    example: 60
                                  fontSize:
                                    type: number
                                    example: 32
                                  fontFamily:
                                    type: string
                                    example: 'Arial, sans-serif'
                                  fontWeight:
                                    type: string
                                    enum: [normal, bold]
                                    example: 'bold'
                                  fontStyle:
                                    type: string
                                    enum: [normal, italic]
                                    example: 'normal'
                                  color:
                                    type: string
                                    example: '#ffffff'
                                  textAlign:
                                    type: string
                                    enum: [left, center, right]
                                    example: 'center'
                                  maxLines:
                                    type: number
                                    example: 2
                            iconElements:
                              type: array
                              description: 'Legacy icon elements (used when migrated=false)'
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                    example: 'icon-1'
                                  type:
                                    type: string
                                    enum: [source-logo, custom-icon]
                                    example: 'source-logo'
                                  iconPath:
                                    type: string
                                    example: '/icons/tmdb-logo.svg'
                                  x:
                                    type: number
                                    example: 25
                                  y:
                                    type: number
                                    example: 25
                                  width:
                                    type: number
                                    example: 50
                                  height:
                                    type: number
                                    example: 50
                                  grayscale:
                                    type: boolean
                                    example: false
                            rasterElements:
                              type: array
                              description: 'Legacy raster image elements (used when migrated=false)'
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                    example: 'raster-1'
                                  type:
                                    type: string
                                    enum: [raster-image]
                                    example: 'raster-image'
                                  imagePath:
                                    type: string
                                    example: '/uploads/background.jpg'
                                  x:
                                    type: number
                                    example: 0
                                  y:
                                    type: number
                                    example: 0
                                  width:
                                    type: number
                                    example: 500
                                  height:
                                    type: number
                                    example: 300
                            svgElements:
                              type: array
                              description: 'Legacy SVG elements (used when migrated=false)'
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                    example: 'svg-1'
                                  type:
                                    type: string
                                    enum: [source-logo, svg-icon]
                                    example: 'svg-icon'
                                  iconPath:
                                    type: string
                                    example: '/icons/custom.svg'
                                  x:
                                    type: number
                                    example: 25
                                  y:
                                    type: number
                                    example: 25
                                  width:
                                    type: number
                                    example: 50
                                  height:
                                    type: number
                                    example: 50
                                  grayscale:
                                    type: boolean
                                    example: false
                            contentGrid:
                              type: object
                              description: 'Legacy content grid (used when migrated=false)'
                              properties:
                                id:
                                  type: string
                                  example: 'grid-1'
                                x:
                                  type: number
                                  example: 50
                                y:
                                  type: number
                                  example: 200
                                width:
                                  type: number
                                  example: 400
                                height:
                                  type: number
                                  example: 400
                                columns:
                                  type: number
                                  example: 3
                                rows:
                                  type: number
                                  example: 3
                                spacing:
                                  type: number
                                  example: 10
                                cornerRadius:
                                  type: number
                                  example: 8
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
        '500':
          description: Failed to fetch poster templates
    post:
      summary: Create new poster template
      description: Creates a new poster template with the provided configuration.
      tags:
        - poster-templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - templateData
              properties:
                name:
                  type: string
                  example: 'My Custom Template'
                description:
                  type: string
                  example: 'A custom poster template'
                templateData:
                  type: object
                  description: 'Template configuration data (same structure as in GET response)'
      responses:
        '201':
          description: Template created successfully
          content:
            application/json:
              schema:
                type: object
                description: 'Same structure as template object in GET response'
        '400':
          description: Invalid template data or validation failed
        '401':
          description: Authentication required
        '500':
          description: Failed to create poster template

  /posters/templates/{id}:
    put:
      summary: Update poster template
      description: Updates an existing poster template. Users can only update their own templates.
      tags:
        - poster-templates
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Template ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                templateData:
                  type: object
      responses:
        '200':
          description: Template updated successfully
        '400':
          description: Invalid template data
        '401':
          description: Authentication required
        '403':
          description: Permission denied
        '404':
          description: Template not found
        '500':
          description: Failed to update poster template
    delete:
      summary: Delete poster template
      description: Soft deletes a poster template. Users can only delete their own templates. Default templates cannot be deleted.
      tags:
        - poster-templates
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Template ID
      responses:
        '204':
          description: Template deleted successfully
        '401':
          description: Authentication required
        '403':
          description: Permission denied or cannot delete default template
        '404':
          description: Template not found
        '500':
          description: Failed to delete poster template

  /posters/templates/{id}/set-default:
    post:
      summary: Set template as default
      description: Sets the specified template as the default template for poster generation. Only one template can be default at a time.
      tags:
        - poster-templates
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Template ID
          example: 1
      responses:
        '200':
          description: Template set as default successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Template set as default successfully'
                  template:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'My Custom Template'
                      isDefault:
                        type: boolean
                        example: true
        '401':
          description: Authentication required
        '404':
          description: Template not found
        '500':
          description: Failed to set template as default

  /posters/templates/{id}/preview:
    get:
      summary: Generate template preview
      description: Generates a preview image of a poster template with optional collection data.
      tags:
        - poster-templates
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Template ID
        - name: collectionName
          in: query
          schema:
            type: string
            default: 'Preview Collection'
          description: Collection name to use in preview
        - name: collectionType
          in: query
          schema:
            type: string
          description: Collection type
        - name: mediaType
          in: query
          schema:
            type: string
            enum: [movie, tv]
            default: movie
          description: Media type
        - name: t
          in: query
          schema:
            type: string
          description: Cache-busting timestamp parameter
      responses:
        '200':
          description: Preview image generated successfully
          content:
            image/png:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid template ID or failed to generate preview
        '500':
          description: Failed to generate template preview

  /posters/templates/validate:
    post:
      summary: Validate template data
      description: Validates poster template data structure and returns sanitized data if valid.
      tags:
        - poster-templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - templateData
              properties:
                templateData:
                  type: object
                  description: 'Template data to validate'
      responses:
        '200':
          description: Validation completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  isValid:
                    type: boolean
                    example: true
                  errors:
                    type: array
                    items:
                      type: string
                    example: []
                  warnings:
                    type: array
                    items:
                      type: string
                    example: []
                  sanitizedData:
                    type: object
                    description: 'Sanitized template data (only present if isValid is true)'
        '400':
          description: Template data is required
        '500':
          description: Failed to validate template data

  /posters/templates/{id}/export:
    get:
      summary: Export template as ZIP with assets
      description: Exports a poster template as a downloadable ZIP file containing the template JSON and all required custom assets (icons, images).
      tags:
        - poster-templates
      parameters:
        - name: id
          in: path
          required: true
          description: Template ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Template exported successfully as ZIP file
          content:
            application/zip:
              schema:
                type: string
                format: binary
                description: ZIP file containing template.json and assets/ folder with custom icons and images
        '400':
          description: Invalid template ID
        '404':
          description: Template not found
        '500':
          description: Failed to export template

  /posters/templates/import:
    post:
      summary: Import template from ZIP
      description: Imports a poster template from a ZIP file exported from Agregarr. The ZIP file must contain template.json and any required custom assets.
      tags:
        - poster-templates
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: ZIP file containing template.json and assets
      responses:
        '201':
          description: Template imported successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 5
                  name:
                    type: string
                    example: 'Imported Template'
                  description:
                    type: string
                    example: 'A template imported from another instance'
                  isDefault:
                    type: boolean
                    example: false
                  templateData:
                    type: object
                    description: 'Complete template configuration data'
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
        '400':
          description: Invalid template data or unsupported version
        '401':
          description: Authentication required
        '500':
          description: Failed to import template

  /posters/saved:
    get:
      summary: Get saved posters
      description: Retrieves all saved posters for the authenticated user.
      tags:
        - poster-saved
      responses:
        '200':
          description: Saved posters retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  posters:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: 'My Custom Poster'
                        description:
                          type: string
                          example: 'A custom poster for my collection'
                        filename:
                          type: string
                          example: 'poster-abc123.jpg'
                        thumbnailFilename:
                          type: string
                          example: 'thumb-abc123.jpg'
                        posterData:
                          type: object
                          description: 'Poster configuration data'
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
        '401':
          description: Authentication required
        '500':
          description: Failed to fetch saved posters
    post:
      summary: Create saved poster
      description: Creates a new saved poster with the provided data.
      tags:
        - poster-saved
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - posterData
              properties:
                name:
                  type: string
                  example: 'My Saved Poster'
                description:
                  type: string
                  example: 'Description of my poster'
                posterData:
                  type: object
                  description: 'Poster configuration data'
                filename:
                  type: string
                  example: 'poster-abc123.jpg'
                thumbnailFilename:
                  type: string
                  example: 'thumb-abc123.jpg'
      responses:
        '201':
          description: Saved poster created successfully
        '400':
          description: Poster name and data are required
        '401':
          description: Authentication required
        '500':
          description: Failed to create saved poster

  /posters/saved/{id}:
    put:
      summary: Update saved poster
      description: Updates an existing saved poster. Users can only update their own posters.
      tags:
        - poster-saved
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Poster ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                posterData:
                  type: object
                filename:
                  type: string
                thumbnailFilename:
                  type: string
      responses:
        '200':
          description: Saved poster updated successfully
        '401':
          description: Authentication required
        '404':
          description: Poster not found
        '500':
          description: Failed to update saved poster
    delete:
      summary: Delete saved poster
      description: Deletes a saved poster. Supports both database posters (integer ID) and file-based posters (string ID with 'file-' prefix). Users can only delete their own posters.
      tags:
        - poster-saved
      parameters:
        - name: id
          in: path
          required: true
          schema:
            oneOf:
              - type: integer
                description: Database poster ID
              - type: string
                pattern: '^file-.+$'
                description: File-based poster ID (starts with 'file-')
          description: Poster ID (integer for database posters, or string starting with 'file-' for file-based posters)
      responses:
        '204':
          description: Saved poster deleted successfully
        '401':
          description: Authentication required
        '404':
          description: Poster not found
        '409':
          description: Poster is currently in use by collections
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Poster is currently in use'
                  message:
                    type: string
                    example: 'This poster is being used by the following collections: Movie Collection, TV Collection'
                  collections:
                    type: array
                    items:
                      type: string
                    example: ['Movie Collection', 'TV Collection']
        '500':
          description: Failed to delete saved poster

  /posters/icons/upload:
    post:
      summary: Upload icon/asset
      description: Uploads an icon or asset file for use in poster templates.
      tags:
        - poster-assets
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - icon
              properties:
                icon:
                  type: string
                  format: binary
                  description: 'Icon file (JPEG, PNG, WebP, SVG, max 10MB)'
                name:
                  type: string
                  description: 'Name for the icon'
                category:
                  type: string
                  description: 'Category for the icon'
                tags:
                  type: string
                  description: 'Comma-separated tags'
                description:
                  type: string
                  description: 'Description of the icon'
      responses:
        '201':
          description: Icon uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  icon:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      filename:
                        type: string
                      category:
                        type: string
                      tags:
                        type: array
                        items:
                          type: string
                      description:
                        type: string
        '400':
          description: No file uploaded or invalid file type
        '500':
          description: Failed to upload icon

  /posters/icons/download:
    post:
      summary: Download icon from URL
      description: Downloads an icon from a URL and saves it to the system.
      tags:
        - poster-assets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  example: 'https://example.com/icon.png'
                name:
                  type: string
                category:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                description:
                  type: string
      responses:
        '201':
          description: Icon downloaded successfully
        '400':
          description: URL is required or download failed
        '500':
          description: Failed to download icon

  /posters/icons:
    get:
      summary: List available icons
      description: Retrieves a list of available icons with optional filtering.
      tags:
        - poster-assets
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [user, system]
          description: Filter by icon type
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
        - name: tags
          in: query
          schema:
            type: array
            items:
              type: string
          description: Filter by tags
        - name: search
          in: query
          schema:
            type: string
          description: Search in name and description
      responses:
        '200':
          description: Icons retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  icons:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        filename:
                          type: string
                        category:
                          type: string
                        tags:
                          type: array
                          items:
                            type: string
                        description:
                          type: string
                        type:
                          type: string
                          enum: [user, system]
        '500':
          description: Failed to list icons

  /fonts:
    get:
      summary: Get available system fonts
      description: Retrieves all available font families from the system for use in poster templates.
      tags:
        - poster-assets
      responses:
        '200':
          description: Fonts retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  fonts:
                    type: array
                    items:
                      type: object
                      properties:
                        family:
                          type: string
                          example: DejaVu Sans
                        availableWeights:
                          type: array
                          items:
                            type: string
                          example: ['Regular', 'Bold', 'Light', 'Medium']
                        cssValue:
                          type: string
                          example: "'DejaVu Sans'"
                        fontUrl:
                          type: string
                          description: URL to font file for web loading
                          example: '/fonts/truetype/dejavu/DejaVuSans.ttf'
                  count:
                    type: integer
                    example: 25
        '500':
          description: Failed to retrieve fonts
  /posters/icons/categories:
    get:
      summary: List icon categories
      description: Retrieves all available icon categories with statistics.
      tags:
        - poster-assets
      responses:
        '200':
          description: Categories retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        displayName:
                          type: string
                        description:
                          type: string
                        iconCount:
                          type: integer
        '500':
          description: Failed to list icon categories

  /posters/icons/{id}:
    delete:
      summary: Delete icon
      description: Deletes an icon by ID.
      tags:
        - poster-assets
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Icon ID
      responses:
        '204':
          description: Icon deleted successfully
        '400':
          description: Icon ID is required
        '404':
          description: Icon not found
        '500':
          description: Failed to delete icon

  /posters/files/{filename}:
    get:
      summary: Serve poster files
      description: Serves poster image files by filename.
      tags:
        - poster-assets
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
          description: Poster filename
      responses:
        '200':
          description: Poster image served successfully
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '400':
          description: Filename is required
        '404':
          description: Poster file not found
        '500':
          description: Failed to serve poster file

  /posters/thumbnails/{filename}:
    get:
      summary: Serve thumbnail files
      description: Serves poster thumbnail files by filename.
      tags:
        - poster-assets
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
          description: Thumbnail filename
      responses:
        '200':
          description: Thumbnail image served successfully
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '400':
          description: Filename is required
        '404':
          description: Thumbnail not found
        '500':
          description: Failed to serve thumbnail file

  /posters/icons/{type}/{filename}:
    get:
      summary: Serve icon files
      description: Serves icon files by type and filename.
      tags:
        - poster-assets
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [user, system]
          description: Icon type
        - name: filename
          in: path
          required: true
          schema:
            type: string
          description: Icon filename
      responses:
        '200':
          description: Icon file served successfully
          content:
            image/*:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid icon type or filename required
        '404':
          description: Icon file not found
        '500':
          description: Failed to serve icon file

  /source-colors:
    get:
      summary: Get all source colors
      description: Retrieves all source color mappings (database + defaults) for poster generation.
      tags:
        - source-colors
      responses:
        '200':
          description: Source colors retrieved successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    primaryColor:
                      type: string
                      example: '#01b4e4'
                    secondaryColor:
                      type: string
                      example: '#0d253f'
                    textColor:
                      type: string
                      example: '#ffffff'
                example:
                  tmdb:
                    primaryColor: '#01b4e4'
                    secondaryColor: '#0d253f'
                    textColor: '#ffffff'
                  trakt:
                    primaryColor: '#ed2224'
                    secondaryColor: '#1f1a1a'
                    textColor: '#ffffff'
                  mdblist:
                    primaryColor: '#4283c9'
                    secondaryColor: '#1a2e42'
                    textColor: '#ffffff'
        '500':
          description: Failed to get source colors

  /source-colors/{sourceType}:
    get:
      summary: Get specific source color scheme
      description: Retrieves color scheme for a specific source type.
      tags:
        - source-colors
      parameters:
        - name: sourceType
          in: path
          required: true
          description: The type of source (e.g., 'trakt', 'imdb', 'letterboxd').
          schema:
            type: string
          example: tmdb
      responses:
        '200':
          description: Source color scheme retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  primaryColor:
                    type: string
                    example: '#01b4e4'
                  secondaryColor:
                    type: string
                    example: '#0d253f'
                  textColor:
                    type: string
                    example: '#ffffff'
        '500':
          description: Failed to get source colors

    put:
      summary: Update source colors
      description: Updates color scheme for a specific source type. This affects all templates using source colors.
      tags:
        - source-colors
      parameters:
        - name: sourceType
          in: path
          required: true
          description: The type of source (e.g., 'trakt', 'imdb', 'letterboxd').
          schema:
            type: string
          example: tmdb
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - primaryColor
                - secondaryColor
                - textColor
              properties:
                primaryColor:
                  type: string
                  pattern: '^#[0-9a-fA-F]{6}$'
                  example: '#01b4e4'
                secondaryColor:
                  type: string
                  pattern: '^#[0-9a-fA-F]{6}$'
                  example: '#0d253f'
                textColor:
                  type: string
                  pattern: '^#[0-9a-fA-F]{6}$'
                  example: '#ffffff'
      responses:
        '200':
          description: Source colors updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Source colors updated for tmdb'
                  colors:
                    type: object
                    properties:
                      primaryColor:
                        type: string
                        example: '#01b4e4'
                      secondaryColor:
                        type: string
                        example: '#0d253f'
                      textColor:
                        type: string
                        example: '#ffffff'
        '400':
          description: Invalid input - missing fields or invalid hex colors
        '500':
          description: Failed to update source colors

    delete:
      summary: Reset source colors to defaults
      description: Resets the specified source type colors to system defaults.
      tags:
        - source-colors
      parameters:
        - name: sourceType
          in: path
          required: true
          description: The type of source (e.g., 'trakt', 'imdb', 'letterboxd').
          schema:
            type: string
          example: tmdb
      responses:
        '200':
          description: Source colors reset successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Source colors reset to defaults for tmdb'
                  colors:
                    type: object
                    properties:
                      primaryColor:
                        type: string
                        example: '#01b4e4'
                      secondaryColor:
                        type: string
                        example: '#0d253f'
                      textColor:
                        type: string
                        example: '#ffffff'
        '500':
          description: Failed to reset source colors

  /source-colors/reset:
    post:
      summary: Reset all source colors to defaults
      description: Resets all source color customizations back to system defaults.
      tags:
        - source-colors
      responses:
        '200':
          description: All source colors reset successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'All source colors reset to defaults'
                  colors:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        primaryColor:
                          type: string
                        secondaryColor:
                          type: string
                        textColor:
                          type: string
        '500':
          description: Failed to reset source colors

  /source-colors/export:
    get:
      summary: Export source colors as JSON
      description: Exports all source color schemes as a downloadable JSON file for sharing.
      tags:
        - source-colors
      responses:
        '200':
          description: Source colors exported successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  sourceColors:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        primaryColor:
                          type: string
                          example: '#ed2224'
                        secondaryColor:
                          type: string
                          example: '#1f1a1a'
                        textColor:
                          type: string
                          example: '#ffffff'
                  exportedAt:
                    type: string
                    format: date-time
                    example: '2023-10-25T10:30:00.000Z'
                  version:
                    type: string
                    example: '1.0'
        '500':
          description: Failed to export source colors

  /source-colors/import:
    post:
      summary: Import source colors from JSON
      description: Imports source color schemes from a JSON file exported from Agregarr.
      tags:
        - source-colors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sourceColors
              properties:
                sourceColors:
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      primaryColor:
                        type: string
                        example: '#ed2224'
                      secondaryColor:
                        type: string
                        example: '#1f1a1a'
                      textColor:
                        type: string
                        example: '#ffffff'
                version:
                  type: string
                  example: '1.0'
      responses:
        '200':
          description: Source colors imported successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Successfully imported 5 source color schemes'
                  importCount:
                    type: integer
                    example: 5
                  sourceColors:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        primaryColor:
                          type: string
                        secondaryColor:
                          type: string
                        textColor:
                          type: string
        '400':
          description: Invalid source colors data or unsupported version
        '401':
          description: Authentication required
        '500':
          description: Failed to import source colors

  /overlay-templates:
    get:
      summary: Get all overlay templates
      description: Retrieves all active overlay templates including system presets and user-created templates.
