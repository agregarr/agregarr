    OverlayTemplate:
      type: object
      description: 'Overlay template for applying customizable badges and banners to library posters'
      properties:
        id:
          type: integer
          readOnly: true
          description: 'Unique identifier'
          example: 1
        name:
          type: string
          description: 'Template name'
          example: 'IMDb Rating Badge'
        description:
          type: string
          nullable: true
          description: 'Optional template description'
          example: 'Shows IMDb rating in top-right corner with gold background'
        type:
          type: string
          enum: ['rating', 'metadata', 'technical', 'status', 'generic']
          description: 'Template type for organization'
          example: 'rating'
        templateData:
          type: object
          description: 'Overlay template design data with layered elements'
          properties:
            width:
              type: number
              description: 'Canvas width for editing'
              example: 1000
            height:
              type: number
              description: 'Canvas height for editing'
              example: 1500
            elements:
              type: array
              description: 'Layered overlay elements (text, tile, variable, SVG, raster)'
              items:
                type: object
        applicationCondition:
          type: object
          nullable: true
          description: 'Condition for when this template should be applied'
          properties:
            field:
              type: string
              description: 'Context field to evaluate (e.g., imdbRating, resolution)'
              example: 'imdbRating'
            operator:
              type: string
              enum: ['eq', 'neq', 'gt', 'gte', 'lt', 'lte', 'in', 'contains']
              description: 'Comparison operator'
              example: 'gte'
            value:
              oneOf:
                - type: string
                - type: number
                - type: array
                  items:
                    oneOf:
                      - type: string
                      - type: number
              description: 'Value to compare against'
              example: 7.5
        isDefault:
          type: boolean
          readOnly: true
          description: 'Whether this is a system preset template (cannot be edited/deleted)'
          example: true
        isActive:
          type: boolean
          description: 'Whether template is active'
          example: true
          default: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
          description: 'Creation timestamp'
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          description: 'Last update timestamp'
      required:
        - name
        - type
        - templateData

    OverlayLibraryConfig:
      type: object
      description: 'Configuration for which overlay templates are applied to a specific library'
      properties:
        id:
          type: integer
          readOnly: true
          description: 'Unique identifier'
          example: 1
        libraryId:
          type: string
          description: 'Plex library ID (unique constraint)'
          example: '1'
        libraryName:
          type: string
          description: 'Library display name'
          example: 'Movies'
        mediaType:
          type: string
          enum: ['movie', 'show']
          description: 'Media type of library'
          example: 'movie'
        enabledOverlays:
          type: array
          description: 'List of enabled overlay templates with layer ordering'
          items:
            type: object
            properties:
              templateId:
                type: integer
                description: 'OverlayTemplate ID'
                example: 1
              enabled:
                type: boolean
                description: 'Whether this overlay is active'
                example: true
              layerOrder:
                type: integer
                description: 'Stacking order (0 = bottom layer, higher = top)'
                example: 0
              config:
                type: object
                description: 'Optional per-overlay configuration'
                properties:
                  daysThreshold:
                    type: number
                    description: 'For Coming Soon overlays - show if days until release is less than this'
                    example: 30
                  timeWindowDays:
                    type: number
                    description: 'For New Release badge - show for X days after download'
                    example: 7
                  minimumRating:
                    type: number
                    description: 'For rating badges - minimum rating to display'
                    example: 7.0
        createdAt:
          type: string
          format: date-time
          readOnly: true
          description: 'Creation timestamp'
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          description: 'Last update timestamp'
      required:
        - libraryId
        - libraryName
        - mediaType
        - enabledOverlays

