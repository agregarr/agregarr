                  message:
                    type: string
                    example: 'Not running'
    post:
      summary: Start collection sync
      description: Starts a collection synchronization process in the background.
      tags:
        - collections
      responses:
        '200':
          description: Collection sync started successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'success'
                  message:
                    type: string
                    example: 'Collections sync started in background'
        '400':
