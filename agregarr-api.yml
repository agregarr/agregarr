            properties:
              friendly_name:
                type: string
                example: 'John Doe'
              user_id:
                type: integer
                example: 1
              total_plays:
                type: integer
                example: 45
              total_time:
                type: integer
                example: 5400
    ActivityStatsResponse:
      type: object
      properties:
        activity:
          type: object
          properties:
            topMovies:
              type: array
              items:
                type: object
            topTV:
              type: array
              items:
                type: object
        tautulliInfo:
          type: object
          nullable: true
        metadata:
          type: object
          properties:
            days:
              type: integer
              example: 7
            limit:
              type: integer
              example: 10
            timestamp:
              type: string
              format: date-time
              example: '2024-01-15T10:30:00Z'
    # Discovery-specific schemas that allow collectionType to be sent (not readOnly)
    PlexHubConfigForDiscovery:
      type: object
      description: 'PlexHubConfig schema for discovery operations - allows collectionType to be sent'
      properties:
        id:
          type: string
          description: 'Unique hub identifier (libraryId-hubIdentifier)'
          example: '1-movie.recentlyadded'
        hubIdentifier:
          type: string
          description: 'Plex built-in hub identifier'
          example: 'movie.recentlyadded'
        name:
          type: string
          description: 'Display name for the hub'
          example: 'Recently Added Movies'
        libraryId:
          type: string
          description: 'Plex library ID'
          example: '1'
        libraryName:
          type: string
          description: 'Plex library display name'
          example: 'Films'
        mediaType:
          type: string
          enum: ['movie', 'tv', 'both']
          description: 'Media type of the hub'
          example: 'movie'
        sortOrderLibrary:
          type: integer
          description: 'Position/order within the library'
          example: 0
        visibilityConfig:
          type: object
          properties:
            usersHome:
              type: boolean
              description: "Show on shared users' home screens"
              example: true
            serverOwnerHome:
              type: boolean
              description: "Show on server owner's home screen"
              example: false
            libraryRecommended:
              type: boolean
              description: 'Show in library recommended section'
              example: false
          required:
            - usersHome
            - serverOwnerHome
            - libraryRecommended
        isActive:
          type: boolean
          description: 'Whether hub is currently active'
          example: true
          readOnly: true
        collectionType:
          type: string
          enum: ['default_plex_hub', 'agregarr_created', 'pre_existing']
          description: 'Type of collection (determined during discovery)'
          example: 'default_plex_hub'
        isLinked:
          type: boolean
          description: 'True if hub is actively linked to other hubs'
          example: false
        linkId:
          type: integer
          description: 'Group ID for linked hubs'
          example: 1
        isUnlinked:
          type: boolean
          description: 'True if this hub was deliberately unlinked'
          example: false
      required:
        - id
        - hubIdentifier
        - name
        - libraryId
        - libraryName
        - mediaType
        - sortOrderLibrary
        - visibilityConfig
        - isActive

    PlexHubManagementResponse:
      type: object
      description: 'Raw Plex hub management API response with hub visibility and promotion data'
      properties:
        MediaContainer:
          type: object
          properties:
            size:
              type: integer
              description: 'Number of hubs in the response'
              example: 5
            Hub:
              type: array
              description: 'Array of hub management data'
              items:
                type: object
                properties:
                  identifier:
                    type: string
                    description: 'Plex hub identifier'
                    example: 'movie.recentlyadded'
                  title:
                    type: string
                    description: 'Hub display title'
                    example: 'Recently Added'
                  recommendationsVisibility:
                    type: string
                    enum: ['all', 'none']
                    description: 'Visibility in recommendations section'
                    example: 'all'
                  homeVisibility:
                    type: string
                    enum: ['all', 'none', 'admin']
                    description: 'Visibility on home screen'
                    example: 'all'
                  promotedToRecommended:
                    type: boolean
                    description: 'Whether hub is promoted to recommended section'
                    example: true
                  promotedToOwnHome:
                    type: boolean
                    description: "Whether hub is promoted to server owner's home"
                    example: false
                  promotedToSharedHome:
                    type: boolean
                    description: "Whether hub is promoted to shared users' home"
                    example: true
                  deletable:
                    type: boolean
                    description: 'Whether hub can be deleted (only for custom collections)'
                    example: true
                required:
                  - identifier
                  - title
                  - recommendationsVisibility
                  - homeVisibility
                  - promotedToRecommended
                  - promotedToOwnHome
                  - promotedToSharedHome
          required:
            - size
            - Hub
      required:
        - MediaContainer

    PreExistingCollectionConfigForDiscovery:
      type: object
      description: 'PreExistingCollectionConfig schema for discovery operations - allows collectionType to be sent'
      properties:
        id:
          type: string
          description: 'Unique collection identifier (libraryId-collectionRatingKey)'
          example: '1-35954'
        collectionRatingKey:
          type: string
          description: 'Plex collection rating key'
          example: '35954'
        name:
          type: string
          description: 'Display name from Plex'
          example: 'Action Movies'
        libraryId:
          type: string
          description: 'Plex library ID'
          example: '1'
        libraryName:
          type: string
          description: 'Plex library display name'
          example: 'Films'
        mediaType:
          type: string
          enum: ['movie', 'tv', 'both']
          description: 'Media type based on collection contents'
          example: 'movie'
        sortOrderHome:
          type: integer
          description: 'Position on Plex home screen'
          example: 0
        sortOrderLibrary:
          type: integer
          description: 'Position in library'
          example: 0
        visibilityConfig:
          type: object
          properties:
            usersHome:
              type: boolean
              description: "Show on shared users' home screens"
              example: true
            serverOwnerHome:
              type: boolean
              description: "Show on server owner's home screen"
              example: false
            libraryRecommended:
              type: boolean
              description: 'Show in library recommended section'
              example: false
          required:
            - usersHome
            - serverOwnerHome
            - libraryRecommended
        isActive:
          type: boolean
          description: 'Whether collection is currently active'
          example: true
          readOnly: true
        collectionType:
          type: string
          enum: ['default_plex_hub', 'agregarr_created', 'pre_existing']
          description: 'Type of collection (determined during discovery)'
          example: 'pre_existing'
        isLinked:
          type: boolean
          description: 'True if collection is actively linked to other collections'
          example: false
        linkId:
          type: integer
          description: 'Group ID for linked collections'
          example: 1
        isUnlinked:
          type: boolean
          description: 'True if this collection was deliberately unlinked'
          example: false
        timeRestriction:
          type: object
          properties:
            alwaysActive:
              type: boolean
              example: true
            dateRanges:
              type: array
              items:
                type: object
                properties:
                  startDate:
                    type: string
                    description: 'DD-MM format'
                    example: '05-12'
                  endDate:
                    type: string
                    description: 'DD-MM format'
                    example: '26-12'
              nullable: true
            weeklySchedule:
              type: object
              properties:
                monday:
                  type: boolean
                tuesday:
                  type: boolean
                wednesday:
                  type: boolean
                thursday:
                  type: boolean
                friday:
                  type: boolean
                saturday:
                  type: boolean
                sunday:
                  type: boolean
              nullable: true
          nullable: true
        customPoster:
          type: string
          description: 'Custom poster filename'
          nullable: true
        autoPoster:
          type: boolean
          description: 'Auto-generate poster during sync'
          example: true
          nullable: true
      required:
        - id
        - collectionRatingKey
        - name
        - libraryId
        - libraryName
        - mediaType
        - sortOrderHome
        - sortOrderLibrary
        - visibilityConfig
        - isActive

    NetworksCountryOption:
      type: object
      description: 'Country option for Networks collections'
      properties:
        value:
          type: string
          description: 'Country code/identifier'
          example: 'united-states'
        label:
          type: string
          description: 'Display name for country'
          example: 'United States'
      required:
        - value
        - label

    NetworksPlatformOption:
      type: object
      description: 'Platform option for Networks collections'
      properties:
        value:
          type: string
          description: 'Platform identifier for Networks collections'
          example: 'netflix_top_10'
        label:
          type: string
          description: 'Display name for platform'
          example: 'Netflix Top 10'
      required:
        - value
        - label

    OriginalsPlatformOption:
      type: object
      description: 'Streaming service provider option for Originals collections'
      properties:
        value:
          type: string
          description: 'Provider identifier for Originals collections'
          example: 'netflix_originals'
        label:
          type: string
          description: 'Display name for streaming service provider'
          example: 'Netflix Originals'
      required:
        - value
        - label

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: 'not found'
              errors:
                type: array
                items:
                  type: object
                  properties:
                    path:
                      type: string
                      example: '/api/v1/source-colors'
                    message:
                      type: string
                      example: 'not found'
                  required:
                    - path
                    - message
            required:
              - message
              - errors

  securitySchemes:
    cookieAuth:
      type: apiKey
      name: agregarr.sid
      in: cookie
    apiKey:
      type: apiKey
      in: header
      name: X-Api-Key

paths:
  /genres/combined:
    get:
      summary: Get combined movie and TV genres
      description: Returns a merged and deduplicated list of all TMDB movie and TV genres
      tags:
        - tmdb
      responses:
        '200':
          description: Combined genres list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 28
                    name:
                      type: string
                      example: Action
  /countries/combined:
    get:
      summary: Get combined movie and TV origin countries
      description: Returns a curated list of common origin countries with localized names
      tags:
        - tmdb
      responses:
        '200':
          description: Combined countries list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    code:
                      type: string
                      example: JP
                    name:
                      type: string
                      example: Japan
  /movie/{id}:
    get:
      summary: Get movie details
      description: Returns detailed information about a movie from TMDB
      tags:
        - movies
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: TMDB movie ID
      responses:
        '200':
          description: Movie details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  title:
                    type: string
                  backdrop_path:
                    type: string
                    nullable: true
                  poster_path:
                    type: string
                    nullable: true
        '500':
          description: Unable to retrieve movie
  /tv/{id}:
    get:
      summary: Get TV show details
      description: Returns detailed information about a TV show from TMDB including seasons
      tags:
        - tv
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: TMDB TV show ID
      responses:
        '200':
          description: TV show details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  backdrop_path:
                    type: string
                    nullable: true
                  poster_path:
                    type: string
                    nullable: true
                  seasons:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        season_number:
                          type: integer
                        name:
                          type: string
                        episode_count:
                          type: integer
                        air_date:
                          type: string
                          nullable: true
        '500':
          description: Unable to retrieve TV show
  /status:
    get:
      summary: Get Agregarr status
      description: Returns the current Agregarr status in a JSON object.
      security: []
      tags:
        - public
      responses:
        '200':
          description: Returned status
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    example: 1.0.0
                  commitTag:
                    type: string
                  updateAvailable:
                    type: boolean
                  commitsBehind:
                    type: number
                  restartRequired:
                    type: boolean
  /status/appdata:
    get:
      summary: Get application data volume status
      description: For Docker installs, returns whether or not the volume mount was configured properly. Always returns true for non-Docker installs.
      security: []
      tags:
        - public
      responses:
        '200':
          description: Application data volume status and path
          content:
            application/json:
              schema:
                type: object
                properties:
                  appData:
                    type: boolean
                    example: true
                  appDataPath:
                    type: string
                    example: /app/config
  /filesystem/browse:
    get:
      summary: Browse filesystem directories
      description: Browse directories on the server filesystem for folder selection (e.g., placeholder root folders)
      tags:
        - filesystem
      parameters:
        - in: query
          name: path
          schema:
            type: string
          required: false
          description: Directory path to browse (defaults to /)
          example: /data/media
      responses:
        '200':
          description: Directory listing
          content:
            application/json:
              schema:
                type: object
                properties:
                  currentPath:
                    type: string
                    example: /data/media
                  parentPath:
                    type: string
                    nullable: true
                    example: /data
                  directories:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          example: movies
                        path:
                          type: string
                          example: /data/media/movies
                        isDirectory:
                          type: boolean
                          example: true
        '400':
          description: Path is not a directory
        '404':
          description: Directory not found or not accessible
        '500':
          description: Failed to browse directory
  /exclusions:
    get:
      summary: Get global exclusions with metadata
      description: Returns all globally excluded items for collections enriched with TMDB metadata (title, year, poster).
      tags:
        - exclusions
      responses:
        '200':
          description: Global exclusions retrieved successfully with TMDB metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  movies:
                    type: array
                    items:
                      type: object
                      properties:
                        tmdbId:
                          type: integer
                          example: 550
                        title:
                          type: string
                          example: Fight Club
                        year:
                          type: integer
                          example: 1999
                        posterPath:
                          type: string
                          example: /pB8BM7pdSp6B6Ih7QZ4DrQ3PmJK.jpg
                    description: Array of excluded movies with TMDB metadata
                  shows:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1399
                        type:
                          type: string
                          enum: [tmdb, tvdb]
                          example: tmdb
                        title:
                          type: string
                          example: Game of Thrones
                        year:
                          type: integer
                          example: 2011
                        posterPath:
                          type: string
                          example: /7WUHnWGx5OO145IRxPDUkQSh4C7.jpg
                    description: Array of excluded TV shows with metadata
    post:
      summary: Add item to global exclusions
      description: Adds an item to the global exclusions list.
      tags:
        - exclusions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mediaType
              properties:
                tmdbId:
                  type: integer
                  example: 550
                  description: TMDB ID (required for movies, optional for TV)
                tvdbId:
                  type: integer
                  example: 121361
                  description: TVDB ID (optional for TV shows)
                mediaType:
                  type: string
                  enum: [movie, tv]
                  example: movie
      responses:
        '200':
          description: Item added to exclusions successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  movies:
                    type: array
                    items:
                      type: integer
                  shows:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        type:
                          type: string
                          enum: [tmdb, tvdb]
        '400':
          description: Invalid request parameters
    delete:
      summary: Remove item from global exclusions
      description: Removes an item from the global exclusions list.
      tags:
        - exclusions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mediaType
              properties:
                tmdbId:
                  type: integer
                  example: 550
                  description: TMDB ID (required for movies, optional for TV)
                tvdbId:
                  type: integer
                  example: 121361
                  description: TVDB ID (optional for TV shows)
                mediaType:
                  type: string
                  enum: [movie, tv]
                  example: movie
      responses:
        '200':
          description: Item removed from exclusions successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  movies:
                    type: array
                    items:
                      type: integer
                  shows:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        type:
                          type: string
                          enum: [tmdb, tvdb]
        '400':
          description: Invalid request parameters
  /collections:
    get:
      summary: Get collection configurations
      description: Returns all collection configurations.
      tags:
        - collections
      responses:
        '200':
          description: Collection configurations retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  collectionConfigs:
                    type: array
                    items:
                      $ref: '#/components/schemas/CollectionConfig'
    post:
      summary: Save collection configurations
      description: Updates collection configurations with the provided values.
      tags:
        - collections
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                collectionConfigs:
                  type: array
                  items:
                    $ref: '#/components/schemas/CollectionConfig'
      responses:
        '200':
          description: Collection configurations saved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  collectionConfigs:
                    type: array
                    items:
                      $ref: '#/components/schemas/CollectionConfig'
                  message:
                    type: string
                    example: 'Collection configurations saved successfully'
        '500':
          description: Failed to save collection configurations
  /collections/create:
    post:
      summary: Create a new collection
      description: Creates a new collection configuration.
      tags:
        - collections
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionConfigCreate'
      responses:
        '201':
          description: Collection created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  collectionConfig:
                    $ref: '#/components/schemas/CollectionConfig'
                  message:
                    type: string
                    example: 'Collection created successfully'
        '500':
          description: Failed to create collection
  /collections/{id}/settings:
    put:
      summary: Update individual collection settings
      description: Updates settings for a specific collection while preserving computed fields.
      tags:
        - collections
      parameters:
        - name: id
          in: path
          required: true
          description: Collection ID
          schema:
            type: string
            example: 'collection-123'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionConfigUpdate'
      responses:
        '200':
          description: Collection settings updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  collectionConfig:
                    $ref: '#/components/schemas/CollectionConfig'
                  message:
                    type: string
                    example: 'Collection settings updated successfully'
        '404':
          description: Collection not found
        '500':
          description: Failed to update collection settings
  /collections/{id}:
    delete:
      summary: Delete individual collection
      description: Delete individual collection and recalculate sort orders. If the collection is linked, all linked collections will be deleted.
      tags:
        - collections
      parameters:
        - name: id
          in: path
          required: true
          description: Collection ID
          schema:
            type: string
            example: 'collection-123'
      responses:
        '200':
          description: Collection(s) deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: '1 collection(s) deleted successfully'
                  deletedConfigs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
        '404':
          description: Collection not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Collection not found'
                  message:
                    type: string
                    example: 'Collection with id "collection-123" not found'
        '500':
          description: Failed to delete collection
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Failed to delete collection'
                  message:
                    type: string
  /collections/{id}/sync:
    post:
      summary: Sync individual collection
      description: Triggers sync for a specific collection by ID. This performs the same sync operation as the global sync but only for the specified collection, without the global preprocessing overhead.
      tags:
        - collections
      parameters:
        - name: id
          in: path
          required: true
          description: Collection ID to sync
          schema:
            type: string
            example: '10000'
      responses:
        '200':
          description: Collection sync started successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'success'
                  message:
                    type: string
                    example: 'Collection sync started for "Movie Collection"'
                  collectionId:
                    type: string
                    example: '10000'
                  collectionName:
                    type: string
                    example: 'Movie Collection'
        '404':
          description: Collection not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'error'
                  message:
                    type: string
                    example: 'Collection with ID 10000 not found'
        '500':
          description: Failed to start collection sync
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'error'
                  message:
                    type: string
                    example: 'Admin user not found'
  /collections/{id}/promote:
    patch:
      summary: Promote collection to top section
      description: Moves a collection from the A-Z alphabetical section to the promoted section with custom ordering.
      tags:
        - collections
      parameters:
        - name: id
          in: path
          required: true
          description: Collection ID
          schema:
            type: string
            example: 'collection-123'
      responses:
        '200':
          description: Collection promoted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  config:
                    $ref: '#/components/schemas/CollectionConfig'
        '400':
          description: Collection is already in promoted section
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Collection is already in promoted section'
        '404':
          description: Collection not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Collection not found'
        '500':
          description: Failed to promote collection
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Failed to promote collection'
  /collections/{id}/demote:
    patch:
      summary: Demote collection to A-Z section
      description: Moves a collection from the promoted section to the A-Z alphabetical section.
      tags:
        - collections
      parameters:
        - name: id
          in: path
          required: true
          description: Collection ID
          schema:
            type: string
            example: 'collection-123'
      responses:
        '200':
          description: Collection demoted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  config:
                    $ref: '#/components/schemas/CollectionConfig'
        '400':
          description: Collection is already in A-Z section
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Collection is already in A-Z section'
        '404':
          description: Collection not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Collection not found'
        '500':
